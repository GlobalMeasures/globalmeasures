<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Global Measures</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    background: radial-gradient(circle at 50% 30%, #0c0c0c 0%, #000 70%);
    color: #F5F2EA; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: clamp(40px, 9vw, 90px) 20px;
  }

  .brand { text-align: center; margin-bottom: clamp(28px, 6vw, 48px); }
  .brand a { text-decoration: none; }
  .brand .name {
    font-size: clamp(22px, 6vw, 34px); font-weight: 200;
    letter-spacing: clamp(0.18em, 4vw, 0.4em); text-transform: uppercase;
    color: #F5F2EA; padding-left: clamp(0.18em, 4vw, 0.4em);
  }
  .brand .hairline { width: 56px; height: 1px; background: #D4AF37; margin: 16px auto; }
  .brand .page {
    font-size: clamp(11px, 2.6vw, 13px); letter-spacing: 0.32em;
    text-transform: uppercase; color: #D4AF37; opacity: 0.9; padding-left: 0.32em;
  }

  form { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 22px; }

  .field label {
    display: block; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #D4AF37; margin-bottom: 9px;
  }
  .field input, .field textarea {
    width: 100%; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(212,175,55,0.35); border-radius: 2px;
    color: #F5F2EA; font-family: inherit; font-size: 15px; padding: 13px 15px;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .field input::placeholder, .field textarea::placeholder { color: rgba(245,242,234,0.35); }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: #D4AF37; background: rgba(212,175,55,0.04);
  }
  .field textarea { resize: vertical; min-height: 130px; line-height: 1.6; }

  .submit {
    margin-top: 6px; cursor: pointer; background: #D4AF37; color: #0a0a0a;
    border: 1px solid #D4AF37; border-radius: 2px; font-family: inherit; font-weight: 600;
    font-size: 12px; letter-spacing: 0.26em; text-transform: uppercase;
    padding: 15px 22px; transition: background 0.25s ease, color 0.25s ease;
  }
  .submit:hover { background: #E8C46A; }

  .foot {
    margin-top: 28px; font-size: 11px; letter-spacing: 0.08em;
    color: rgba(245,242,234,0.45); text-align: center;
  }
  .foot a { color: rgba(212,175,55,0.85); text-decoration: none; }
  .foot a:hover { color: #D4AF37; }
</style>
</head>
<body>

<div class="brand">
  <a href="index.html"><div class="name">Global Measures</div></a>
  <div class="hairline"></div>
  <div class="page">Contact</div>
</div>

<form action="https://formsubmit.co/info@settingthebars.com" method="POST">
  <!-- FormSubmit configuration -->
  <input type="hidden" name="_subject" value="New Global Measures Contact" />
  <input type="hidden" name="_template" value="table" />
  <input type="text" name="_honey" style="display:none" />

  <div class="field">
    <label for="name">Name</label>
    <input id="name" type="text" name="Name" placeholder="Your full name" required />
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" name="Email" placeholder="you@example.com" required />
  </div>

  <div class="field">
    <label for="phone">Phone</label>
    <input id="phone" type="tel" name="Phone" placeholder="+1 (555) 000-0000" />
  </div>

  <div class="field">
    <label for="message">Message</label>
    <textarea id="message" name="Message" placeholder="How can we help?" required></textarea>
  </div>

  <button class="submit" type="submit">Send Message</button>
</form>

<div class="foot">
  &larr; <a href="index.html">Return to Global Measures</a>
</div>

</body>
</html>
