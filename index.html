<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#scene-container {
  position: fixed;
  inset: 0;
  background: #000000;
}

/* UI */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 10;
  pointer-events: none;
  color: #F5F2EA;
}

h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: 0.45em;
  font-size: 52px;
  text-transform: uppercase;
}

.sub {
  margin-top: 14px;
  font-size: 15px;
  letter-spacing: 0.08em;
  opacity: 0.75;
  max-width: 600px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div id="scene-container"></div>

<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive Gateway To Authentic Experiences</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let globe, dotGroup;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);
  document.getElementById("scene-container").appendChild(renderer.domElement);

  // LIGHTING (balanced for Earth realism)
  const ambient = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffffff, 1.8);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  const accent = new THREE.PointLight(0xd4af37, 1.0);
  accent.position.set(-5, 2, 4);
  scene.add(accent);

  // 🌍 REAL EARTH TEXTURE
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  const texture = new THREE.TextureLoader().load(
    "https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg"
  );

  const material = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: 1,
    metalness: 0
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // =========================
  // 📍 REAL WORLD LOCATIONS (lat/lon)
  // =========================
  const locations = [
    { lat: 51.5072, lng: -0.1276 },   // London
    { lat: 40.7128, lng: -74.0060 },   // New York
    { lat: 34.0522, lng: -118.2437 },  // LA
    { lat: 48.8566, lng: 2.3522 },     // Paris
    { lat: 35.6762, lng: 139.6503 },   // Tokyo
    { lat: -33.8688, lng: 151.2093 },  // Sydney
    { lat: 25.2048, lng: 55.2708 },    // Dubai
    { lat: 1.3521, lng: 103.8198 }     // Singapore
  ];

  dotGroup = new THREE.Group();

  const dotGeometry = new THREE.BufferGeometry();
  const positions = [];

  locations.forEach(loc => {

    const phi = (90 - loc.lat) * (Math.PI / 180);
    const theta = (loc.lng + 180) * (Math.PI / 180);

    const x = -(Math.sin(phi) * Math.cos(theta));
    const z = (Math.sin(phi) * Math.sin(theta));
    const y = Math.cos(phi);

    positions.push(x, y, z);
  });

  dotGeometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotMaterial = new THREE.PointsMaterial({
    color: 0xd4af37,
    size: 0.03
  });

  const dots = new THREE.Points(dotGeometry, dotMaterial);

  dotGroup.add(dots);
  scene.add(dotGroup);

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0015;
  dotGroup.rotation.y += 0.0015;

  renderer.render(scene, camera);
}

</script>

</body>
</html>
