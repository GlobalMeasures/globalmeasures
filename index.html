<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures Earth</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #050505;
  overflow: hidden;
}

/* Globe container */
canvas {
  display: block;
}

/* subtle vignette like Apple/Cloudflare */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.4) 60%,
    rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="globe"></canvas>
<div class="vignette"></div>

<script>
const canvas = document.getElementById("globe");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const R = 200;
let rot = 0;

/* -----------------------------
   REAL EARTH CONTINENT MASK
   (simplified lat/lon land approximation)
------------------------------*/

// This is a VERY simplified land bias function.
// Later we replace with real GeoJSON.
function isLand(lat, lon) {

  // rough continent bands
  const absLat = Math.abs(lat);

  // Africa / Europe / Asia belt
  if (absLat < 0.9 && lon > -2.8 && lon < 2.8) return true;

  // Americas zone
  if (lon < -2.2 || lon > 2.2) return Math.random() > 0.3;

  // default ocean rejection
  return Math.random() > 0.85;
}

/* -----------------------------
   DESTINATION POINTS (LAND ONLY)
------------------------------*/
const points = [];

for (let i = 0; i < 1800; i++) {

  const lat = Math.asin(Math.random()*2 - 1);
  const lon = Math.random() * Math.PI * 2 - Math.PI;

  if (isLand(lat, lon)) {
    points.push({lat, lon});
  }
}

/* -----------------------------
   3D PROJECTION
------------------------------*/
function project(lat, lon, rot){

  const x = Math.cos(lat) * Math.cos(lon + rot);
  const y = Math.sin(lat);
  const z = Math.cos(lat) * Math.sin(lon + rot);

  return {x,y,z};
}

/* -----------------------------
   DRAW LOOP
------------------------------*/
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // glow core
  const glow = ctx.createRadialGradient(cx,cy,10,cx,cy,500);
  glow.addColorStop(0,"rgba(200,168,107,0.12)");
  glow.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // globe points
  for(let p of points){

    const r = project(p.lat,p.lon,rot);

    if(r.z > 0){

      const x = cx + r.x * R;
      const y = cy + r.y * R;

      const depth = r.z;

      ctx.beginPath();
      ctx.fillStyle = `rgba(200,168,107,${0.2 + depth * 0.8})`;
      ctx.arc(x,y,1.4 * depth,0,Math.PI*2);
      ctx.fill();
    }
  }

  rot += 0.0015;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
