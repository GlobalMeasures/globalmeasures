<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#scene-container {
  position: fixed;
  inset: 0;
  background: #000000;
}

/* CENTER TEXT */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 10;
  pointer-events: none;
  color: #F5F2EA;
}

h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: 0.45em;
  font-size: 52px;
  text-transform: uppercase;
}

.sub {
  margin-top: 14px;
  font-size: 15px;
  letter-spacing: 0.08em;
  opacity: 0.75;
  max-width: 600px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div id="scene-container"></div>

<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive Gateway To Authentic Experiences</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let globe, dotsGroup;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);
  document.getElementById("scene-container").appendChild(renderer.domElement);

  /* LIGHT */
  const light = new THREE.PointLight(0xd4af37, 2.2);
  light.position.set(5, 3, 5);
  scene.add(light);

  /* 🌍 REAL EARTH TEXTURE (KEY UPGRADE) */
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  const texture = new THREE.TextureLoader().load(
    "https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-dark.jpg"
  );

  const material = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: 0.9,
    metalness: 0.1
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  /* DOTS (DESTINATIONS) */
  dotsGroup = new THREE.Group();

  const dotsGeometry = new THREE.BufferGeometry();
  const dotsCount = 300;

  const positions = [];

  for (let i = 0; i < dotsCount; i++) {

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);

    const x = Math.sin(phi) * Math.cos(theta);
    const y = Math.sin(phi) * Math.sin(theta);
    const z = Math.cos(phi);

    positions.push(x, y, z);
  }

  dotsGeometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotsMaterial = new THREE.PointsMaterial({
    color: 0xd4af37,
    size: 0.02
  });

  const dots = new THREE.Points(dotsGeometry, dotsMaterial);

  dotsGroup.add(dots);
  scene.add(dotsGroup);

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0018;
  dotsGroup.rotation.y += 0.0018;

  globe.rotation.x += 0.0002;
  dotsGroup.rotation.x += 0.0002;

  renderer.render(scene, camera);
}

</script>

</body>
</html>
