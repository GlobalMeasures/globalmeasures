<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #050505;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  color: #F5F2EA;
}

/* ===== CINEMATIC LIGHT FIELD ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 45%, rgba(255, 214, 170, 0.14), transparent 45%),
    radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.04), transparent 60%),
    radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.02), transparent 50%),
    radial-gradient(circle at 80% 60%, rgba(255, 214, 170, 0.05), transparent 55%);
  filter: blur(45px);
  opacity: 1;
  z-index: 0;
}

/* CINEMA VIGNETTE */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.78) 100%);
  z-index: 1;
}

/* ===== CENTER LAYOUT ===== */
.center {
  position: absolute;
  width: 100%;
  top: 46%;
  transform: translateY(-50%);
  text-align: center;
  z-index: 10;
}

/* ===== TYPOGRAPHY ===== */
h1 {
  font-size: 44px;
  letter-spacing: 0.35em;
  font-weight: 500;
  margin: 0;
  opacity: 0;
  transform: translateY(10px);
  transition: 1.2s ease;
}

h2 {
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.08em;
  margin-top: 14px;
  opacity: 0;
  transform: translateY(10px);
  transition: 1.2s ease;
}

h3 {
  font-weight: 300;
  font-size: 12px;
  opacity: 0.65;
  margin-top: 8px;
  transition: 1.2s ease;
}

/* ===== BOARDING PASS CARD ===== */
.card {
  margin: 60px auto 0;
  width: 340px;
  padding: 22px;
  border-radius: 14px;

  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255, 214, 170, 0.25);

  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);

  cursor: pointer;

  opacity: 0;
  transform: translateY(18px);
  transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.active {
  opacity: 1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-4px) scale(1.01);
  border-color: rgba(255, 214, 170, 0.6);
}

/* BUTTON */
.button {
  margin-top: 16px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255, 214, 170, 0.4);
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.25em;
  transition: 0.3s ease;
}

.button:hover {
  background: rgba(255, 214, 170, 0.06);
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  opacity: 0;
  z-index: 10;
  transition: 1.5s ease;
}

/* EXIT ANIMATION */
.fade-out {
  animation: fadeOut 2.2s forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.02); }
}
</style>
</head>

<body>

<div class="center" id="content">

  <h1 id="t1">GLOBAL MEASURES</h1>
  <h2 id="t2">Immersive guide to global food & drink experiences</h2>
  <h3 id="t3">Leave algorithms behind. Enter curated reality.</h3>

  <div class="card" id="card" onclick="enter()">
    <div style="font-size:12px; opacity:0.7;">BOARDING PASS</div>
    <div style="margin-top:10px;">BEGIN YOUR JOURNEY</div>
    <div style="margin-top:10px; font-size:11px; opacity:0.6;">Gate GM-01</div>
    <div class="button">ENTER AIRPORT</div>
  </div>

</div>

<div class="footer" id="footer">
  21+ EXPERIENCE • EXPLORE RESPONSIBLY
</div>

<script>
window.onload = () => {

  setTimeout(() => {
    document.getElementById("t1").style.opacity = 1;
    document.getElementById("t1").style.transform = "translateY(0)";
  }, 400);

  setTimeout(() => {
    document.getElementById("t2").style.opacity = 1;
    document.getElementById("t2").style.transform = "translateY(0)";
  }, 1200);

  setTimeout(() => {
    document.getElementById("t3").style.opacity = 1;
    document.getElementById("t3").style.transform = "translateY(0)";
  }, 2000);

  setTimeout(() => {
    document.getElementById("card").classList.add("active");
  }, 2800);

  setTimeout(() => {
    document.getElementById("footer").style.opacity = 0.7;
  }, 3600);
};

function enter() {
  const content = document.getElementById("content");
  const card = document.getElementById("card");

  card.style.borderColor = "rgba(255, 214, 170, 0.8)";

  setTimeout(() => {
    content.classList.add("fade-out");
  }, 300);

  setTimeout(() => {
    window.location.href = "https://YOUR-IMMERSIVE-URL-HERE";
  }, 2000);
}
</script>

</body>
</html>
