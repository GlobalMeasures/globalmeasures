<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: Arial, sans-serif;
}

/* container */
#scene-container {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* UI overlay */
.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  color: #F5F2EA;
  z-index: 10;
  padding-top: 60px;
}

h1 {
  letter-spacing: 8px;
  font-weight: 400;
  margin: 0;
}

.sub {
  opacity: 0.7;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="scene-container"></div>

<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive global food & drink experiences</div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, globe;

init();
animate();

function init() {

  // Scene
  scene = new THREE.Scene();

  // Camera
  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById("scene-container").appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.PointLight(0xd4af37, 2);
  light.position.set(5, 3, 5);
  scene.add(light);

  // Globe geometry
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  // Gold material (wire + glow feel)
  const material = new THREE.MeshStandardMaterial({
    color: 0xd4af37,
    wireframe: true,
    metalness: 0.6,
    roughness: 0.3
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // Add destination dots (fake travel nodes)
  const dotsGeometry = new THREE.BufferGeometry();
  const dotsCount = 200;

  const positions = [];

  for (let i = 0; i < dotsCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);

    const x = Math.sin(phi) * Math.cos(theta);
    const y = Math.sin(phi) * Math.sin(theta);
    const z = Math.cos(phi);

    positions.push(x, y, z);
  }

  dotsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotsMaterial = new THREE.PointsMaterial({
    color: 0xd4af37,
    size: 0.02
  });

  const dots = new THREE.Points(dotsGeometry, dotsMaterial);
  scene.add(dots);

  // Resize
  window.addEventListener("resize", onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.002;
  globe.rotation.x += 0.0005;

  renderer.render(scene, camera);
}
</script>

</body>
</html>
