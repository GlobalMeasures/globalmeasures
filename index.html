<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures Globe v2</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #050505;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="globe"></canvas>

<script>
const canvas = document.getElementById("globe");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --------------------
// GLOBE CONFIG
// --------------------
const R = 190;
let rot = 0;

// --------------------
// BETTER "EARTH-LIKE" POINT DISTRIBUTION
// (biased toward equator = more land-like feel)
// --------------------
const points = [];

for (let i = 0; i < 1200; i++) {

  // latitude bias (more points near equator)
  const u = Math.random();
  const lat = Math.asin(u * 2 - 1) * 0.9;

  const lon = Math.random() * Math.PI * 2;

  // cluster weighting (creates "continent feel")
  const cluster = Math.random();

  points.push({
    lat,
    lon,
    size: cluster > 0.92 ? 2.2 : 1.2
  });
}

// --------------------
// 3D ROTATION
// --------------------
function project(lat, lon, rot){

  const cosLat = Math.cos(lat);
  const sinLat = Math.sin(lat);

  const x = cosLat * Math.cos(lon + rot);
  const y = sinLat;
  const z = cosLat * Math.sin(lon + rot);

  return {x,y,z};
}

// --------------------
// RENDER LOOP
// --------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // --------------------
  // GLOBE GLOW (APPLE / CLOUDFLARE STYLE BASE)
  // --------------------
  const glow = ctx.createRadialGradient(cx,cy,10,cx,cy,500);
  glow.addColorStop(0,"rgba(200,168,107,0.12)");
  glow.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // --------------------
  // DRAW SPHERE POINTS
  // --------------------
  for(let p of points){

    const r = project(p.lat,p.lon,rot);

    // front side only
    if(r.z > 0){

      const x = cx + r.x * R;
      const y = cy + r.y * R;

      // depth fade (VERY important for realism)
      const alpha = Math.min(1, r.z * 1.4);

      ctx.beginPath();
      ctx.fillStyle = `rgba(200,168,107,${0.15 + alpha * 0.75})`;

      ctx.arc(x,y,p.size * alpha,0,Math.PI*2);
      ctx.fill();
    }
  }

  rot += 0.0016; // slower = more premium feel

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
