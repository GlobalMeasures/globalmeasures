<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures Globe</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #050505;
  overflow: hidden;
}

/* Canvas fills screen */
#globe {
  width: 100vw;
  height: 100vh;
  display: block;
}
</style>
</head>

<body>

<canvas id="globe"></canvas>

<script>
const canvas = document.getElementById("globe");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- GLOBE SETTINGS ---
const RADIUS = 180;
const dots = [];

// generate fake "destinations" on globe surface
for (let i = 0; i < 600; i++) {
  const lat = Math.acos(2 * Math.random() - 1) - Math.PI / 2;
  const lon = Math.random() * Math.PI * 2;
  dots.push({ lat, lon });
}

let rotation = 0;

// convert 3D sphere -> 2D screen
function project(lat, lon, rot) {
  const x = Math.cos(lat) * Math.cos(lon + rot);
  const y = Math.sin(lat);
  const z = Math.cos(lat) * Math.sin(lon + rot);

  return { x, y, z };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // subtle glow core
  const gradient = ctx.createRadialGradient(cx, cy, 10, cx, cy, 400);
  gradient.addColorStop(0, "rgba(200,168,107,0.08)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    const p = project(d.lat, d.lon, rotation);

    // only show front side of globe
    if (p.z > 0) {
      const x = cx + p.x * RADIUS;
      const y = cy + p.y * RADIUS;

      const size = p.z * 2.2;

      ctx.beginPath();
      ctx.fillStyle = "rgba(200,168,107,0.9)";
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  rotation += 0.0022;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
