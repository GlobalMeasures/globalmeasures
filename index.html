<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
/* =========================
   GLOBAL RESET (CRITICAL)
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

/* prevents any canvas gaps */
canvas {
  display: block;
}

/* =========================
   SCENE CONTAINER
========================= */
#scene-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000;
}

/* =========================
   CENTER UI OVERLAY
========================= */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 10;
  color: #F5F2EA;
  pointer-events: none;
}

h1 {
  margin: 0;
  font-weight: 400;
  letter-spacing: 10px;
}

.sub {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- 3D SCENE -->
<div id="scene-container"></div>

<!-- UI -->
<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive global food & drink experiences</div>
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let globe, dotsGroup;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1); // HARD BLACK FIX
  document.getElementById("scene-container").appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.PointLight(0xd4af37, 2);
  light.position.set(5, 3, 5);
  scene.add(light);

  // =========================
  // GLOBE
  // =========================
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  const material = new THREE.MeshStandardMaterial({
    color: 0xd4af37,
    roughness: 0.6,
    metalness: 0.4,
    wireframe: false
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // =========================
  // DOTS (ATTACHED TO GLOBE)
  // =========================
  dotsGroup = new THREE.Group();

  const dotsGeometry = new THREE.BufferGeometry();
  const dotsCount = 250;

  const positions = [];

  for (let i = 0; i < dotsCount; i++) {

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);

    const x = Math.sin(phi) * Math.cos(theta);
    const y = Math.sin(phi) * Math.sin(theta);
    const z = Math.cos(phi);

    positions.push(x, y, z);
  }

  dotsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotsMaterial = new THREE.PointsMaterial({
    color: 0xd4af37,
    size: 0.03
  });

  const dots = new THREE.Points(dotsGeometry, dotsMaterial);

  dotsGroup.add(dots);
  scene.add(dotsGroup);

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.002;
  globe.rotation.x += 0.0003;

  dotsGroup.rotation.y += 0.002;
  dotsGroup.rotation.x += 0.0003;

  renderer.render(scene, camera);
}
</script>

</body>
</html>
