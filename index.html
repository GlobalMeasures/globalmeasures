<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#scene-container {
  position: fixed;
  inset: 0;
  background: #000000;
}

/* =========================
   BRAND OVERLAY
========================= */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 10;
  pointer-events: none;
  color: #F5F2EA;
}

h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: 0.45em;
  font-size: 52px;
  text-transform: uppercase;
}

.sub {
  margin-top: 14px;
  font-size: 15px;
  letter-spacing: 0.08em;
  opacity: 0.75;
  max-width: 600px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div id="scene-container"></div>

<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive Gateway To Authentic Experiences</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let globe, dotGroup;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);

  document.getElementById("scene-container").appendChild(renderer.domElement);

  // =========================
  // LIGHTING (BRAND GOLD FEEL)
  // =========================
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  const keyLight = new THREE.DirectionalLight(0xd4af37, 2.2);
  keyLight.position.set(5, 3, 5);
  scene.add(keyLight);

  const fillLight = new THREE.PointLight(0xd4af37, 0.8);
  fillLight.position.set(-5, -2, 4);
  scene.add(fillLight);

  // =========================
  // 🌍 STYLIZED BRAND GLOBE (NO EARTH TEXTURE)
  // =========================
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  const material = new THREE.MeshStandardMaterial({
    color: 0xd4af37,
    roughness: 0.35,
    metalness: 0.65,
    emissive: new THREE.Color(0x3a2a10),
    emissiveIntensity: 0.6
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // subtle wireframe depth layer (gives structure, not “flat ball”)
  const wireframe = new THREE.LineSegments(
    new THREE.WireframeGeometry(geometry),
    new THREE.LineBasicMaterial({
      color: 0x6b4f1d,
      transparent: true,
      opacity: 0.25
    })
  );

  globe.add(wireframe);

  // =========================
  // 📍 CURATED DESTINATIONS (NOT RANDOM, NOT EARTH-BASED)
  // =========================
  const points = [
    [0.2, 0.9, 0.3],
    [-0.6, 0.4, 0.6],
    [0.7, -0.2, 0.6],
    [-0.3, -0.8, 0.4],
    [0.5, 0.1, -0.8],
    [-0.8, 0.2, -0.4],
    [0.1, -0.6, -0.7]
  ];

  dotGroup = new THREE.Group();

  const geometryDots = new THREE.BufferGeometry();
  const positions = [];

  points.forEach(p => {
    positions.push(p[0], p[1], p[2]);
  });

  geometryDots.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotMaterial = new THREE.PointsMaterial({
    color: 0xd4af37,
    size: 0.03
  });

  const dots = new THREE.Points(geometryDots, dotMaterial);

  dotGroup.add(dots);
  scene.add(dotGroup);

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0018;
  globe.rotation.x += 0.0002;

  dotGroup.rotation.y += 0.0018;
  dotGroup.rotation.x += 0.0002;

  renderer.render(scene, camera);
}

</script>

</body>
</html>
