<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#scene-container {
  position: fixed;
  inset: 0;
  background: #000000;
}

/* CENTER TEXT */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  pointer-events: none;
  color: #F5F2EA;
}

h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: 0.4em;
  font-size: 48px;
}

.sub {
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="scene-container"></div>

<div class="overlay">
  <h1>GLOBAL MEASURES</h1>
  <div class="sub">Immersive Gateway To Authentic Experiences</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let globe, dotsGroup;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);

  document.getElementById("scene-container").appendChild(renderer.domElement);

  // LIGHTING (simple, not stylized)
  const ambient = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambient);

  const directional = new THREE.DirectionalLight(0xffffff, 1.2);
  directional.position.set(5, 3, 5);
  scene.add(directional);

  // 🌍 SIMPLE DARK GLOBE (NO GOLD)
  const geometry = new THREE.SphereGeometry(1, 64, 64);

  const material = new THREE.MeshStandardMaterial({
    color: 0x222222,
    roughness: 1,
    metalness: 0
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // 📍 SIMPLE DOTS (FIXED TO GLOBE)
  dotsGroup = new THREE.Group();

  const dotGeometry = new THREE.BufferGeometry();

  const positions = [
    0.5, 0.2, 0.8,
    -0.4, 0.6, 0.7,
    0.2, -0.7, 0.6,
    -0.6, -0.2, 0.7,
    0.7, 0.1, -0.6
  ];

  dotGeometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const dotMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.04
  });

  const dots = new THREE.Points(dotGeometry, dotMaterial);

  dotsGroup.add(dots);
  scene.add(dotsGroup);

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0015;
  dotsGroup.rotation.y += 0.0015;

  renderer.render(scene, camera);
}

</script>

</body>
</html>
