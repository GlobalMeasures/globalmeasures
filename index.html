<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Measures</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, #0a0a0a, #000000 70%);
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
}

/* CANVAS (GLOBE) */
#globe {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* DARK CINEMATIC VIGNETTE */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  z-index: 1;
}

/* UI LAYER */
.center {
  position: absolute;
  width: 100%;
  top: 45%;
  transform: translateY(-50%);
  text-align: center;
  z-index: 10;
  color: #F5F2EA;
}

h1 {
  font-size: 44px;
  letter-spacing: 0.35em;
  margin: 0;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

h2 {
  margin-top: 14px;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.08em;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
  animation-delay: 0.4s;
}

.card {
  margin: 60px auto 0;
  width: 340px;
  padding: 22px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,175,55,0.35);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
  animation-delay: 1s;
  cursor: pointer;
}

.button {
  margin-top: 16px;
  padding: 12px;
  border: 1px solid rgba(212,175,55,0.6);
  text-align: center;
  letter-spacing: 0.2em;
  font-size: 12px;
}

.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  opacity: 0.6;
  z-index: 10;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<canvas id="globe"></canvas>

<div class="center">
  <h1>GLOBAL MEASURES</h1>
  <h2>Immersive global food & drink intelligence network</h2>

  <div class="card" onclick="enter()">
    <div style="font-size:12px; opacity:0.7;">BOARDING PASS</div>
    <div style="margin-top:10px;">BEGIN YOUR JOURNEY</div>
    <div style="margin-top:10px; font-size:11px; opacity:0.6;">Gate GM-01</div>
    <div class="button">ENTER AIRPORT</div>
  </div>
</div>

<div class="footer">
  21+ EXPERIENCE • EXPLORE RESPONSIBLY
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>
/* =========================
   GLOBE SETUP
========================= */

const canvas = document.getElementById("globe");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3.2;

/* LIGHT */
const light = new THREE.PointLight(0xd4af37, 1.2);
light.position.set(5,3,5);
scene.add(light);

/* GLOBE */
const geometry = new THREE.SphereGeometry(1, 64, 64);

/* GOLD MATERIAL */
const material = new THREE.MeshStandardMaterial({
  color: 0xd4af37,
  metalness: 0.9,
  roughness: 0.35
});

const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

/* ===== DESTINATION DOTS ===== */
const dots = [];

function addDot(lat, lon) {
  const radius = 1.01;

  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);

  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);

  const dotGeo = new THREE.SphereGeometry(0.01, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xffd27a });

  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.set(x, y, z);

  scene.add(dot);
  dots.push(dot);
}

/* SAMPLE GLOBAL DESTINATIONS */
const destinations = [
  [40.7128, -74.0060], // NYC
  [51.5072, -0.1276],  // London
  [48.8566, 2.3522],   // Paris
  [35.6762, 139.6503], // Tokyo
  [25.2048, 55.2708],  // Dubai
  [-33.8688, 151.2093],// Sydney
  [19.4326, -99.1332], // Mexico City
  [1.3521, 103.8198]   // Singapore
];

destinations.forEach(d => addDot(d[0], d[1]));

/* ANIMATION LOOP */
function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0025;

  dots.forEach(d => {
    d.lookAt(camera.position);
  });

  renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

/* ENTER */
function enter() {
  document.body.style.transition = "1.5s ease";
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "https://YOUR-IMMERSIVE-URL-HERE";
  }, 1200);
}
</script>

</body>
</html>
